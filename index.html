    // All months in the dataset for filter options
    const ALL_MONTHS = glassdoorMetrics.map(d => d.month);

    // Date range filter component
    function DateRangeFilter({ startMonth, endMonth, onStartChange, onEndChange }) {
      return (
        <div className="flex items-center gap-2 text-sm">
          <span className="text-gray-500 text-xs font-medium">Range:</span>
          <select value={startMonth} onChange={e => onStartChange(e.target.value)}
            className="border border-gray-300 rounded px-2 py-1 text-xs bg-white" style={{ minWidth: 90 }}>
            {ALL_MONTHS.map(m => <option key={m} value={m}>{m}</option>)}
          </select>
          <span className="text-gray-400 text-xs">to</span>
          <select value={endMonth} onChange={e => onEndChange(e.target.value)}
            className="border border-gray-300 rounded px-2 py-1 text-xs bg-white" style={{ minWidth: 90 }}>
            {ALL_MONTHS.map(m => <option key={m} value={m}>{m}</option>)}
          </select>
        </div>
      );
    }

    // Helper to filter data arrays by month range
    function filterByRange(data, startMonth, endMonth, monthKey = "month") {
      const startIdx = ALL_MONTHS.indexOf(startMonth);
      const endIdx = ALL_MONTHS.indexOf(endMonth);
      return data.filter(d => {
        const idx = ALL_MONTHS.indexOf(d[monthKey]);
        return idx >= startIdx && idx <= endIdx;
      });
    }

    function ScoreCard({ label, value, prev, target, suffix = "" }) {
      const delta = prev ? (value - prev).toFixed(2) : null;
      const isUp = delta > 0;
      const isDown = delta < 0;
      const belowTarget = target && value < target;
      return (
        <div className="bg-white rounded-lg border border-gray-200 p-4 flex flex-col gap-1">
          <span className="text-xs font-medium text-gray-500 uppercase tracking-wide">{label}</span>
          <div className="flex items-baseline gap-2">
            <span className={`text-2xl font-bold ${belowTarget ? "text-red-600" : "text-gray-900"}`}>{value}{suffix}</span>
            {delta && (
              <span className={`text-sm font-medium ${isUp ? "text-green-600" : isDown ? "text-red-600" : "text-gray-400"}`}>
                {isUp ? "↑" : isDown ? "↓" : "—"} {Math.abs(delta)}
              </span>
            )}
          </div>
          {target && <span className="text-xs text-gray-400">Target: {target}+</span>}
        </div>
      );
    }

    function StatusBadge({ status }) {
      const colors = { Active: "bg-green-100 text-green-700", Trial: "bg-yellow-100 text-yellow-700", Paused: "bg-gray-100 text-gray-500", Inactive: "bg-red-100 text-red-600", draft: "bg-blue-100 text-blue-700", final: "bg-green-100 text-green-700" };
      return <span className={`px-2 py-1 rounded-full text-xs font-medium ${colors[status] || colors.Active}`}>{status}</span>;
    }

    function SeverityDot({ severity }) {
      const c = { high: "bg-red-500", medium: "bg-yellow-500", low: "bg-blue-400" };
      return <span className={`inline-block w-2 h-2 rounded-full ${c[severity] || c.low} mr-2`} />;
    }

    // ─── TAB: OVERVIEW ───

      const negDelta = curr ? curr.negative - (prev?.negative || 0) : 0;

        { name: "SF", val: recentOffice.SF },
        { name: "Seattle", val: recentOffice.Seattle },
        { name: "Australia", val: recentOffice.Australia },
        { name: "Canada", val: recentOffice.Canada },
        { name: "UK", val: recentOffice.UK },
        { name: "Tokyo", val: recentOffice.Tokyo },

      const bottomOffice = officeEntries[officeEntries.length - 1];

      const offices = ["NYC", "SF", "Seattle", "Australia", "Canada", "UK", "Tokyo"];
      const officeColors = { NYC: COLORS.accent, SF: COLORS.green, Seattle: COLORS.amber, Australia: COLORS.blue, Canada: COLORS.purple, UK: COLORS.red, Tokyo: "#64748b" };

    function getThemeFrequency(allThemes) {
      const freq = {};
      allThemes.forEach(m => {
        [...m.cons].forEach(c => {

          freq[key].count++;
          freq[key].months.push(m.month);
        });
      });
      return Object.values(freq).sort((a, b) => b.count - a.count);
    }

        <div className="flex flex-col" style={{ gap: "1.5rem" }}>
          <div className="flex items-center gap-3">
            <h2 className="text-lg font-semibold text-gray-900">Monthly Analysis</h2>
            <select
              value={selectedIdx}
              onChange={(e) => setSelectedIdx(Number(e.target.value))}
              className="border border-gray-300 rounded px-3 py-1 text-sm bg-white"
            >
              {monthlyReports.map((r, i) => (
                <option key={i} value={i}>{r.month}</option>
              ))}
            </select>
            <StatusBadge status={report.status} />
          </div>

          <div className="bg-white rounded-lg border border-gray-200 p-5">
            <h3 className="text-sm font-semibold uppercase tracking-wide mb-2">Executive Summary</h3>
            <p className="text-sm text-gray-700 leading-relaxed">{report.summary}</p>
          </div>

          <div className="bg-white rounded-lg border border-gray-200 p-5">
            <h3 className="text-sm font-semibold uppercase tracking-wide mb-3">Platform Scores</h3>
            <table className="w-full text-sm">
              <thead>
                <tr className="border-b border-gray-200">
                  <th className="text-left py-2 px-3 text-xs font-semibold text-gray-500">Platform</th>
                  <th className="text-left py-2 px-3 text-xs font-semibold text-gray-500">Score</th>
                  <th className="text-left py-2 px-3 text-xs font-semibold text-gray-500">vs. Prior Month</th>
                  <th className="text-left py-2 px-3 text-xs font-semibold text-gray-500">Status</th>
                </tr>
              </thead>
              <tbody>
                {report.platformScores.map((p, i) => (
                  <tr key={i} className="border-b border-gray-100">
                    <td className="py-2 px-3 font-medium text-gray-800">{p.platform}</td>
                    <td className={`py-2 px-3 font-bold ${p.score < 4.0 && p.platform === "Glassdoor" ? "text-red-600" : "text-gray-900"}`}>{p.score}</td>
                    <td className="py-2 px-3 text-gray-600">{p.change}</td>
                    <td className="py-2 px-3"><span className={`px-2 py-1 rounded-full text-xs font-medium ${p.vsTarget.includes("Below") ? "bg-red-100 text-red-700" : p.vsTarget === "Healthy" ? "bg-green-100 text-green-700" : "bg-gray-100 text-gray-600"}`}>{p.vsTarget}</span></td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>

          <div className="bg-white rounded-lg border border-gray-200 p-5">
            <h3 className="text-sm font-semibold uppercase tracking-wide mb-3">Reputation Management</h3>
            <div className="grid grid-cols-2 gap-4 mb-4">
              <div className="bg-green-50 rounded-lg p-4 text-center">
                <p className="text-2xl font-bold text-green-700">{report.reputationMgmt.removed}</p>
                <p className="text-xs text-green-600 mt-1">Reviews Removed</p>
                <p className="text-xs text-gray-500 mt-1">{report.reputationMgmt.removedDetail}</p>
              </div>
              <div className="bg-yellow-50 rounded-lg p-4 text-center">
                <p className="text-2xl font-bold text-yellow-700">{report.reputationMgmt.flagged}</p>
                <p className="text-xs text-yellow-600 mt-1">Reviews Flagged</p>
                <p className="text-xs text-gray-500 mt-1">{report.reputationMgmt.flaggedDetail}</p>
              </div>
            </div>
            <div className="bg-gray-50 rounded p-3">
              <p className="text-xs font-semibold text-gray-500 uppercase mb-1">Partner Notes</p>
              <p className="text-sm text-gray-700">{report.reputationMgmt.partnerNotes}</p>
            </div>
          </div>

          <div className="grid grid-cols-2 gap-4">
            <div className="bg-white rounded-lg border border-gray-200 p-5">
              <h3 className="text-sm font-semibold text-green-700 uppercase tracking-wide mb-3">Pros — What's Working</h3>
              <div className="flex flex-col" style={{ gap: "0.75rem" }}>
                {report.reviewThemes.pros.map((t, i) => (
                  <div key={i} className="pl-3" style={{ borderLeft: "2px solid #22c55e" }}>
                    <p className="text-sm font-medium text-gray-800">{t.theme}</p>
                    <p className="text-xs text-gray-600 mt-1">{t.detail}</p>
                  </div>
                ))}
              </div>
            </div>
            <div className="bg-white rounded-lg border border-gray-200 p-5">
              <h3 className="text-sm font-semibold text-red-700 uppercase tracking-wide mb-3">Cons — Risk Areas</h3>
              <div className="flex flex-col" style={{ gap: "0.75rem" }}>
                {report.reviewThemes.cons.map((t, i) => (
                  <div key={i} className="pl-3" style={{ borderLeft: "2px solid #ef4444" }}>
                    <p className="text-sm font-medium text-gray-800">{t.theme}</p>
                    <p className="text-xs text-gray-600 mt-1">{t.detail}</p>
                  </div>
                ))}
              </div>
            </div>
          </div>

          <div className="bg-white rounded-lg border border-gray-200 p-5">
            <h3 className="text-sm font-semibold uppercase tracking-wide mb-3">Interview Experience</h3>
            {report.interviewExp.total ? (
              <div className="grid grid-cols-3 gap-4 text-center">
                <div><p className="text-2xl font-bold text-gray-800">{report.interviewExp.total}</p><p className="text-xs text-gray-500">Total Reviews</p></div>
                <div><p className="text-2xl font-bold text-red-600">{report.interviewExp.negativePct}%</p><p className="text-xs text-gray-500">Negative</p></div>
                <div><p className="text-2xl font-bold text-green-600">{report.interviewExp.acceptPct}%</p><p className="text-xs text-gray-500">Accept Rate</p></div>
              </div>
            ) : (
              <p className="text-sm text-gray-500 italic">{report.interviewExp.notes}</p>
            )}
          </div>

          <div className="bg-white rounded-lg border border-gray-200 p-5">
            <h3 className="text-sm font-semibold uppercase tracking-wide mb-3">Risk Flags</h3>
            <div className="flex flex-col" style={{ gap: "0.5rem" }}>
              {report.riskFlags.map((r, i) => (
                <div key={i} className="flex items-start py-1">
                  <SeverityDot severity={r.severity} />
                  <div className="flex-1">
                    <span className={`text-xs font-semibold uppercase mr-2 ${r.severity === "high" ? "text-red-600" : r.severity === "medium" ? "text-yellow-600" : "text-blue-500"}`}>{r.severity}</span>
                    <span className="text-sm text-gray-700">{r.flag}</span>
                  </div>
                </div>
              ))}
            </div>
          </div>
        </div>
      );
    }

    // ─── MAIN DASHBOARD ───
    function ReputationDashboard() {
      const [activeTab, setActiveTab] = useState(0);
      const [startMonth, setStartMonth] = useState(ALL_MONTHS[0]);
      const [endMonth, setEndMonth] = useState(ALL_MONTHS[ALL_MONTHS.length - 1]);
      const lastUpdated = "March 2, 2026";

      const tabContent = [
        <OverviewTab startMonth={startMonth} endMonth={endMonth} />,
        <GlassdoorTab startMonth={startMonth} endMonth={endMonth} />,
        <InterviewTab startMonth={startMonth} endMonth={endMonth} />,
        <AgencyTab />,
        <ThemeHistoryTab />,
        <MonthlyReportTab />,
      ];

      return (
        <div className="min-h-screen bg-gray-50">
          <div style={{ backgroundColor: "#480029" }} className="px-6 py-1">
            <span className="text-white text-xs font-semibold tracking-widest uppercase" style={{ fontFamily: "Archivo, sans-serif" }}>Rokt</span>
          </div>
          <div className="bg-white border-b border-gray-200 px-6 py-4">
            <div className="flex items-center justify-between">
              <div>
                <h1 className="text-xl font-bold text-gray-900">Reputation Management Dashboard</h1>
                <p className="text-sm" style={{ color: "#86868B" }}>Glassdoor · Indeed · Blind — Employer Brand Tracking</p>
              </div>
              <div className="flex items-center gap-6">
                {activeTab < 4 && <DateRangeFilter startMonth={startMonth} endMonth={endMonth} onStartChange={setStartMonth} onEndChange={setEndMonth} />}
                <div className={`${activeTab < 4 ? "border-l border-gray-200 pl-6" : ""} text-right`} style={{ whiteSpace: "nowrap" }}>
                  <span className="text-xs" style={{ color: "#86868B" }}>Last updated</span>
                  <p className="text-sm font-medium" style={{ color: "#C20075" }}>{lastUpdated}</p>
                </div>
              </div>
            </div>
          </div>
          <div className="bg-white border-b border-gray-200 px-6">
            <div className="flex gap-1 overflow-x-auto">
              {TABS.map((tab, i) => (
                <button key={tab} onClick={() => setActiveTab(i)}
                  className={`px-4 py-3 text-sm font-medium border-b-2 transition-colors whitespace-nowrap cursor-pointer ${activeTab === i ? "text-gray-900" : "border-transparent text-gray-500 hover:text-gray-700 hover:border-gray-300"}`}
                  style={activeTab === i ? { borderBottomColor: "#C20075", color: "#480029" } : {}}
                >{tab}</button>
              ))}
            </div>
          </div>
          <div className="px-6 py-6" style={{ maxWidth: "72rem" }}>{tabContent[activeTab]}</div>
        </div>
      );
    }

    ReactDOM.render(<ReputationDashboard />, document.getElementById("root"));
  </script>
</body>
</html>
